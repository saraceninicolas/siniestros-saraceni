<!DOCTYPE html>
<html lang="es" data-density="regular" data-sidebar="charcoal">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saraceni Seguros · Portal de Siniestros</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --brand:#DD0909; --brand-d:#bb0707;
  --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#FBFBFC;
  --ink:#191C22; --ink-2:#5A6271; --muted:#8B93A1;
  --line:#E7E9ED; --line-2:#EFF1F4;
  --sb-bg:#13161C; --sb-ink:#C9CFD9; --sb-ink-dim:#8A93A1; --sb-active:#1E232C;
  --font-scale:1;
  --radius:12px; --radius-sm:9px;
  --row-pad:13px;
  --shadow-sm:0 1px 2px rgba(16,20,28,.05),0 1px 3px rgba(16,20,28,.04);
  --shadow-md:0 4px 16px rgba(16,20,28,.08),0 2px 6px rgba(16,20,28,.05);
  --shadow-lg:0 18px 50px rgba(16,20,28,.22),0 6px 18px rgba(16,20,28,.12);
}
html[data-sidebar="rojo"]{ --sb-bg:#9c0808; --sb-ink:#ffd9d9; --sb-ink-dim:#f0a3a3; --sb-active:#7d0606; }
html[data-sidebar="claro"]{ --sb-bg:#FFFFFF; --sb-ink:#3A414D; --sb-ink-dim:#8B93A1; --sb-active:#F4F1F1; }
html[data-density="compact"]{ --row-pad:9px; }
html[data-density="comfy"]{ --row-pad:18px; }

*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{
  font-family:"Public Sans",system-ui,sans-serif;
  font-size:calc(15px * var(--font-scale));
  background:var(--bg); color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
#root,.app{ height:100vh; }
.app{ display:grid; grid-template-columns:248px 1fr; overflow:hidden; }
.mono{ font-family:"JetBrains Mono",ui-monospace,monospace; font-variant-numeric:tabular-nums; }
button{ font-family:inherit; cursor:pointer; }
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-thumb{ background:#d3d7dd; border-radius:99px; border:3px solid var(--bg); }

/* ---------- loader ---------- */
.boot{ height:100vh; display:grid; place-items:center; background:var(--bg); }
.boot-inner{ text-align:center; color:var(--muted); font-size:14px; }
.boot-spin{ width:34px; height:34px; border-radius:99px; border:3px solid var(--line);
  border-top-color:var(--brand); margin:0 auto 14px; animation:boot-rot .8s linear infinite; }
@keyframes boot-rot{ to{ transform:rotate(360deg); } }

/* ---------- buttons ---------- */
.btn-primary,.btn-ghost,.btn-danger{
  display:inline-flex; align-items:center; gap:7px; border-radius:var(--radius-sm);
  font-size:13.5px; font-weight:600; border:1px solid transparent; padding:9px 14px;
  transition:.15s; white-space:nowrap;
}
.btn-primary{ background:var(--brand); color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.12); }
.btn-primary:hover{ background:var(--brand-d); }
.btn-primary:disabled{ opacity:.45; cursor:not-allowed; }
.btn-ghost{ background:#fff; color:var(--ink-2); border-color:var(--line); }
.btn-ghost:hover:not(:disabled){ background:var(--surface-2); color:var(--ink); border-color:#dcdfe5; }
.btn-ghost:disabled{ opacity:.4; cursor:not-allowed; }
.btn-ghost.danger:hover:not(:disabled){ color:var(--brand); border-color:#f3c9c9; background:#fdf2f2; }
.btn-danger{ background:var(--brand); color:#fff; }
.btn-danger:hover{ background:var(--brand-d); }
.tb-icon{ padding:9px; }

/* ---------- sidebar ---------- */
.sb{ background:var(--sb-bg); display:flex; flex-direction:column; padding:18px 14px 14px; gap:4px;
  border-right:1px solid rgba(255,255,255,.04); position:relative; }
.sb::after{ content:""; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--brand); opacity:.9; }
html[data-sidebar="claro"] .sb{ border-right:1px solid var(--line); }
html[data-sidebar="rojo"] .sb::after{ display:none; }
.sb-brand{ padding:4px 6px 14px; margin-bottom:6px; border-bottom:1px solid rgba(255,255,255,.07); }
html[data-sidebar="claro"] .sb-brand{ border-bottom-color:var(--line); }
.sb-logo{ background:#fff; border-radius:10px; padding:11px 13px; box-shadow:var(--shadow-sm); }
.sb-logo img{ display:block; width:100%; height:auto; }
.sb-sub{ display:flex; align-items:center; gap:7px; color:var(--sb-ink-dim); font-size:11px; font-weight:600;
  letter-spacing:.05em; text-transform:uppercase; margin-top:13px; padding-left:4px; }
.sb-sub-dot{ width:6px; height:6px; border-radius:99px; background:var(--brand); }
.sb-nav{ display:flex; flex-direction:column; gap:14px; margin-top:6px; }
.sb-group{ display:flex; flex-direction:column; gap:2px; }
.sb-group-label{ font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
  color:var(--sb-ink-dim); padding:2px 10px 6px; opacity:.7; }
.sb-item{ display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:9px;
  background:transparent; border:none; color:var(--sb-ink); font-size:13.5px; font-weight:500; text-align:left;
  transition:.14s; position:relative; }
.sb-item:hover{ background:var(--sb-active); color:#fff; }
html[data-sidebar="claro"] .sb-item:hover{ color:var(--ink); }
.sb-item.is-active{ background:var(--sb-active); color:#fff; font-weight:600; }
.sb-item.is-active .sb-item-ico{ color:var(--brand); }
html[data-sidebar="claro"] .sb-item.is-active{ color:var(--ink); }
html[data-sidebar="rojo"] .sb-item.is-active .sb-item-ico{ color:#fff; }
.sb-item-ico{ display:grid; place-items:center; flex-shrink:0; transition:.14s; }
.sb-item-label{ flex:1; }
.sb-count{ margin-left:auto; background:var(--brand); color:#fff; font-size:11px; font-weight:700;
  min-width:20px; height:20px; display:grid; place-items:center; border-radius:99px; padding:0 6px; }
.sb-station{ margin-top:auto; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.07);
  border-radius:11px; padding:12px; }
html[data-sidebar="claro"] .sb-station{ background:var(--surface-2); border-color:var(--line); }
.sb-station-row{ display:flex; align-items:center; gap:7px; color:var(--sb-ink-dim); font-size:10.5px;
  font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
.sb-station-row svg{ margin-left:auto; }
.sb-station-led{ width:8px; height:8px; border-radius:99px; background:#2ec27a; box-shadow:0 0 0 3px rgba(46,194,122,.18);
  animation:pulse 2.4s infinite; flex-shrink:0; }
@keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
.sb-station-name{ font-family:"JetBrains Mono",monospace; color:#fff; font-size:13.5px; font-weight:500; margin-top:9px; }
html[data-sidebar="claro"] .sb-station-name{ color:var(--ink); }
.sb-station-note{ color:var(--sb-ink-dim); font-size:10.5px; margin-top:3px; }
.sb-foot{ display:flex; flex-direction:column; gap:1px; padding:12px 8px 4px; margin-top:10px;
  border-top:1px solid rgba(255,255,255,.07); }
html[data-sidebar="claro"] .sb-foot{ border-top-color:var(--line); }
.sb-foot-mark{ font-size:12px; font-weight:800; letter-spacing:.16em; color:var(--sb-ink); }
html[data-sidebar="claro"] .sb-foot-mark{ color:var(--ink); }
.sb-foot-meta{ font-size:10px; color:var(--sb-ink-dim); }

/* ---------- topbar ---------- */
.main{ display:flex; flex-direction:column; overflow:hidden; }
.tb{ display:flex; align-items:center; gap:20px; padding:14px 28px; background:var(--surface);
  border-bottom:1px solid var(--line); box-shadow:0 1px 0 rgba(16,20,28,.02); }
.tb-titles h1{ margin:0; font-size:19px; font-weight:700; letter-spacing:-.015em; }
.tb-crumb{ display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); margin-bottom:3px; }
.tb-crumb b{ color:var(--ink-2); font-weight:600; }
.tb-crumb svg{ opacity:.6; }
.tb-search{ flex:1; max-width:440px; margin-left:8px; display:flex; align-items:center; gap:9px;
  background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px 12px; transition:.15s; }
.tb-search:focus-within{ border-color:var(--brand); background:#fff; box-shadow:0 0 0 3px rgba(221,9,9,.08); }
.tb-search input{ border:none; outline:none; background:none; flex:1; font-size:13.5px; color:var(--ink); }
.tb-search-clear{ border:none; background:none; color:var(--muted); display:grid; place-items:center; padding:2px; }
.tb-actions{ display:flex; align-items:center; gap:10px; margin-left:auto; }
.tb-date{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-2); font-weight:500; }
.tb-date svg{ color:var(--muted); }
.tb-sep{ width:1px; height:26px; background:var(--line); }
.tb-station-chip{ display:inline-flex; align-items:center; gap:7px; background:var(--surface-2);
  border:1px solid var(--line); border-radius:99px; padding:7px 13px; font-family:"JetBrains Mono",monospace;
  font-size:12px; font-weight:500; color:var(--ink-2); transition:.15s; }
.tb-station-chip:hover{ border-color:#dcdfe5; color:var(--ink); }

/* ---------- content ---------- */
.content{ flex:1; overflow:auto; padding:24px 28px 40px; }
.kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px; }
.kpi{ position:relative; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 18px 15px; box-shadow:var(--shadow-sm); overflow:hidden; transition:.16s; }
.kpi:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
.kpi-stripe{ position:absolute; top:0; left:0; width:100%; height:3px; opacity:.85; }
.kpi-top{ display:flex; align-items:center; gap:10px; }
.kpi-label{ font-size:12.5px; color:var(--ink-2); font-weight:600; }
.kpi-ico{ width:30px; height:30px; border-radius:8px; display:grid; place-items:center; flex-shrink:0; }
.kpi-mid{ display:flex; align-items:baseline; gap:10px; margin-top:11px; }
.kpi-value{ font-size:30px; font-weight:800; letter-spacing:-.025em; line-height:1; font-variant-numeric:tabular-nums; }
.kpi-delta{ font-size:11.5px; font-weight:700; padding:2px 7px; border-radius:99px; font-variant-numeric:tabular-nums; }
.kpi-delta.up{ color:#15803D; background:#E6F4EA; }
.kpi-delta.down{ color:#C0241D; background:#FBE3E3; }
.kpi-delta.flat{ color:var(--muted); background:var(--surface-2); }
.kpi-foot{ margin-top:13px; }
.kpi-bar{ height:5px; border-radius:99px; background:var(--line-2); overflow:hidden; }
.kpi-bar span{ display:block; height:100%; border-radius:99px; opacity:.85; transition:width .4s ease; }
.kpi-hint{ font-size:11.5px; color:var(--muted); margin-top:7px; display:block; }

/* ---------- badges & cell helpers ---------- */
.badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px;
  font-weight:600; white-space:nowrap; line-height:1.2; }
.badge-dot{ width:6px; height:6px; border-radius:99px; }
.cia-pill{ display:inline-block; font-size:12px; font-weight:600; color:var(--ink-2); background:var(--surface-2);
  border:1px solid var(--line); border-radius:7px; padding:3px 9px; white-space:nowrap; }
.cia-pill.sm{ font-size:11px; padding:2px 7px; }
.ramo{ display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink); font-weight:600; }
.ramo svg{ color:var(--brand); opacity:.85; flex-shrink:0; }
.ramo-sub{ display:block; font-size:11px; color:var(--muted); font-weight:500; font-style:normal; margin-top:1px; }
.urg-none{ color:var(--muted); }
.vence{ display:flex; flex-direction:column; gap:3px; align-items:flex-start; }
.vence-date{ font-size:12px; color:var(--ink-2); font-weight:600; }
.cell-id{ font-size:12px; font-weight:600; color:var(--ink); }
.cell-gestion{ max-width:230px; }
.gestion-text{ font-size:12.5px; color:var(--ink-2); display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden; line-height:1.35; }
.gestion-done{ display:inline-flex; align-items:center; gap:5px; font-size:12px; color:#15803D; font-weight:600; }

/* ---------- panel + toolbar ---------- */
.panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow-sm); overflow:hidden; }
.toolbar{ display:flex; align-items:center; gap:14px; padding:14px 16px; border-bottom:1px solid var(--line-2);
  flex-wrap:wrap; }
.toolbar-left{ display:flex; align-items:center; gap:9px; }
.toolbar-title{ font-size:14.5px; font-weight:700; }
.toolbar-count{ background:var(--surface-2); border:1px solid var(--line); color:var(--ink-2); font-size:12px;
  font-weight:700; border-radius:99px; padding:1px 9px; font-variant-numeric:tabular-nums; }
.toolbar-right{ display:flex; align-items:center; gap:9px; margin-left:auto; flex-wrap:wrap; }
.seg{ display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:3px; }
.seg-btn{ border:none; background:none; padding:6px 11px; border-radius:6px; font-size:12.5px; font-weight:600;
  color:var(--ink-2); transition:.13s; }
.seg-btn:hover{ color:var(--ink); }
.seg-btn.is-on{ background:#fff; color:var(--brand); box-shadow:var(--shadow-sm); }
.select{ border:1px solid var(--line); background:#fff; border-radius:9px; padding:8px 11px; font-size:12.5px;
  font-weight:600; color:var(--ink-2); font-family:inherit; }
.toolbar-divider{ width:1px; height:24px; background:var(--line); }

/* ---------- table ---------- */
.table-wrap{ overflow-x:auto; }
.table{ width:100%; border-collapse:collapse; }
.table th{ text-align:left; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:.05em; padding:11px 14px; border-bottom:1px solid var(--line); white-space:nowrap; background:var(--surface-2); }
.table td{ padding:var(--row-pad) 14px; border-bottom:1px solid var(--line-2); font-size:13px; vertical-align:middle; }
.table tbody tr{ cursor:pointer; transition:background .12s; }
.table tbody tr:hover{ background:#fbfafa; }
.table tbody tr.is-selected{ background:#fdf3f3; box-shadow:inset 3px 0 0 var(--brand); }
.table tbody tr:last-child td{ border-bottom:none; }
.cell-strong{ font-weight:600; color:var(--ink); }
.cell-sub{ font-size:11.5px; color:var(--muted); margin-top:1px; }
.dim{ color:var(--ink-2); }
.radio{ width:16px; height:16px; border-radius:99px; border:2px solid #cfd4dc; display:inline-block; transition:.13s; }
.radio.on{ border-color:var(--brand); background:radial-gradient(circle at center,var(--brand) 0 4px,transparent 5px); }
.tipo{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-2); font-weight:500; }
.tipo svg{ color:var(--muted); }
.pc-tag{ display:inline-block; font-size:10.5px; color:var(--ink-2); background:var(--surface-2);
  border:1px solid var(--line); border-radius:5px; padding:1px 6px; margin-top:3px; }
.row-open{ border:none; background:none; color:var(--muted); display:grid; place-items:center; padding:5px;
  border-radius:7px; transition:.13s; }
.row-open:hover{ background:var(--surface-2); color:var(--brand); }

/* empty + placeholder */
.empty,.placeholder{ text-align:center; padding:60px 24px; color:var(--muted); }
.empty-ico,.ph-ico{ width:54px; height:54px; border-radius:14px; background:var(--surface-2); border:1px solid var(--line);
  display:grid; place-items:center; margin:0 auto 14px; color:var(--ink-2); }
.empty-title{ font-size:15px; font-weight:700; color:var(--ink); }
.empty-sub{ font-size:13px; margin-top:4px; max-width:340px; margin-inline:auto; }
.placeholder h2{ margin:0 0 6px; color:var(--ink); font-size:20px; }
.placeholder p{ max-width:380px; margin:0 auto 18px; font-size:13.5px; }

/* ---------- modal ---------- */
.modal-scrim{ position:fixed; inset:0; background:rgba(16,20,28,.45); backdrop-filter:blur(2px);
  display:grid; place-items:center; padding:24px; z-index:60; animation:fade .15s ease; }
@keyframes fade{ from{ opacity:0; } }
.modal{ background:var(--surface); border-radius:16px; box-shadow:var(--shadow-lg); width:100%; max-width:480px;
  display:flex; flex-direction:column; max-height:90vh; overflow:hidden; animation:pop .18s cubic-bezier(.2,.9,.3,1.3); }
.modal-wide{ max-width:640px; }
.modal-sm{ max-width:420px; }
@keyframes pop{ from{ transform:translateY(10px) scale(.98); opacity:0; } }
.modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:20px 22px 14px; }
.modal-head h2{ margin:0; font-size:17.5px; font-weight:700; letter-spacing:-.01em; }
.modal-head p{ margin:3px 0 0; font-size:12.5px; color:var(--muted); }
.modal-body{ padding:4px 22px 20px; overflow:auto; }
.modal-foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 22px;
  border-top:1px solid var(--line-2); background:var(--surface-2); }
.foot-note{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); }
.foot-btns{ display:flex; gap:9px; }

/* form */
.form-section{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--brand);
  margin:18px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line-2); }
.form-section:first-child{ margin-top:2px; }
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field-full{ grid-column:1/-1; }
.field-label{ font-size:12px; font-weight:600; color:var(--ink-2); }
.field-label i{ color:var(--brand); font-style:normal; }
.input{ border:1px solid var(--line); border-radius:9px; padding:9px 11px; font-size:13.5px; font-family:inherit;
  color:var(--ink); background:#fff; outline:none; transition:.15s; width:100%; resize:vertical; }
.input:focus{ border-color:var(--brand); box-shadow:0 0 0 3px rgba(221,9,9,.09); }
.input:disabled{ background:var(--surface-2); color:var(--muted); }
.input.err{ border-color:var(--brand); box-shadow:0 0 0 3px rgba(221,9,9,.1); }
.estado-pills{ display:flex; flex-wrap:wrap; gap:7px; }
.epill{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:#fff;
  border-radius:99px; padding:6px 11px; font-size:12px; font-weight:600; color:var(--ink-2); transition:.13s; }
.epill:hover{ border-color:#d3d7dd; }
.epill.on{ border-color:var(--brand); color:var(--brand); background:#fdf3f3; }
.epill-dot{ width:7px; height:7px; border-radius:99px; }
.check-row{ display:flex; align-items:center; gap:9px; font-size:13px; color:var(--ink-2); cursor:pointer; }
.check-row input{ width:16px; height:16px; accent-color:var(--brand); }

/* detail */
.dt-head{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:2px 0 15px; border-bottom:1px solid var(--line-2); }
.dt-cal{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--ink-2);
  background:var(--surface-2); border:1px solid var(--line); border-radius:99px; padding:3px 9px; }
.dt-action{ margin:15px 0; padding:14px 16px; border:1px solid #f3d6d6; background:#fdf5f5; border-radius:11px; }
.dt-action-k{ display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:var(--brand); }
.dt-action-v{ font-size:14.5px; font-weight:600; color:var(--ink); margin-top:7px; line-height:1.4; }
.dt-action-deadline{ font-size:12px; color:var(--ink-2); margin-top:8px; }
.dt-cols{ display:grid; grid-template-columns:1fr 1fr; gap:0 26px; }
.dt-block{ padding:16px 0 4px; border-top:1px solid var(--line-2); }
.dt-cols .dt-block{ border-top:none; padding-top:14px; }
.dt-block-title{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  color:var(--muted); margin-bottom:8px; }
.dt-row{ display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px solid var(--line-2); }
.dt-row:last-child{ border-bottom:none; }
.dt-k{ font-size:12px; color:var(--muted); font-weight:600; }
.dt-v{ font-size:13px; font-weight:500; text-align:right; }
.dt-gestor{ margin-top:10px; }
.dt-gestor-card{ display:flex; align-items:center; gap:11px; margin-top:8px; background:var(--surface-2);
  border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
.dt-gestor-av{ width:34px; height:34px; border-radius:99px; background:#fff; border:1px solid var(--line);
  display:grid; place-items:center; color:var(--ink-2); flex-shrink:0; }
.dt-gestor-name{ font-size:13.5px; font-weight:600; color:var(--ink); }
.dt-gestor-mail{ display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--brand);
  text-decoration:none; margin-top:2px; }
.dt-gestor-mail:hover{ text-decoration:underline; }
.dt-obs{ margin:0; font-size:13px; color:var(--ink-2); line-height:1.55; }
.dt-ticket{ display:inline-flex; align-items:center; gap:7px; margin-top:11px; font-size:12.5px; font-weight:600;
  color:var(--ink); text-decoration:none; background:var(--surface-2); border:1px solid var(--line);
  border-radius:9px; padding:8px 13px; transition:.14s; }
.dt-ticket:hover{ border-color:var(--brand); color:var(--brand); }
.dt-ticket svg{ color:var(--brand); }
.dt-stamp{ margin-top:16px; padding-top:12px; border-top:1px solid var(--line-2); font-size:11.5px; color:var(--muted); }

/* ---------- detail screen (pantalla completa) ---------- */
.ds{ max-width:1040px; margin:0 auto; animation:dsIn .22s ease; }
@keyframes dsIn{ from{ opacity:0; transform:translateY(6px); } }
.ds-topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
.ds-back{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:#fff;
  color:var(--ink-2); border-radius:9px; padding:8px 13px; font-size:13px; font-weight:600; transition:.14s; }
.ds-back:hover{ color:var(--brand); border-color:#f3c9c9; background:#fdf3f3; }
.ds-top-actions{ display:flex; gap:9px; }
.ds-hero{ display:flex; align-items:flex-start; justify-content:space-between; gap:20px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow-sm); padding:22px 24px; position:relative; overflow:hidden; }
.ds-hero::before{ content:""; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--brand); }
.ds-crumb{ font-size:12px; color:var(--muted); font-weight:600; }
.ds-client{ margin:7px 0 12px; font-size:25px; font-weight:800; letter-spacing:-.02em; color:var(--ink); }
.ds-badges{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.ds-hero-right{ display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
.cia-pill.lg{ font-size:13px; padding:6px 13px; }
.ds-cobertura{ font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.ds-action{ display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  margin-top:16px; padding:18px 22px; border:1px solid #f3d6d6; background:#fdf5f5; border-radius:var(--radius); }
.ds-action-k{ display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:var(--brand); }
.ds-action-v{ font-size:17px; font-weight:700; color:var(--ink); margin-top:8px; line-height:1.35; }
.ds-action-deadline{ display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--ink-2); margin-top:10px; }
.ds-action-deadline svg{ color:var(--brand); }
.ds-action-cal{ display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
.ds-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
.ds-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow-sm); padding:18px 20px; }
.ds-card-wide{ grid-column:1/-1; }
.ds-card-title{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; color:var(--ink);
  padding-bottom:11px; margin-bottom:6px; border-bottom:1px solid var(--line-2); }
.ds-card-title svg{ color:var(--brand); opacity:.8; }
.ds-row{ display:flex; justify-content:space-between; gap:14px; padding:8px 0; border-bottom:1px solid var(--line-2); }
.ds-row:last-child{ border-bottom:none; }
.ds-k{ font-size:12.5px; color:var(--muted); font-weight:600; }
.ds-v{ font-size:13.5px; font-weight:500; color:var(--ink); text-align:right; }
.ds-gestion-block .ds-k{ display:block; margin-bottom:4px; }
.ds-gestion-text{ margin:0; font-size:14px; color:var(--ink); line-height:1.5; font-weight:500; }
.ds-gestor{ display:flex; align-items:center; gap:13px; padding-top:4px; }
.ds-gestor-av{ width:42px; height:42px; border-radius:99px; background:var(--surface-2); border:1px solid var(--line);
  display:grid; place-items:center; color:var(--ink-2); flex-shrink:0; }
.ds-gestor-name{ font-size:15px; font-weight:700; color:var(--ink); }
.ds-gestor-mail{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--brand);
  text-decoration:none; margin-top:3px; }
.ds-gestor-mail:hover{ text-decoration:underline; }
.ds-gestor-nomail{ font-size:12.5px; color:var(--muted); margin-top:3px; display:block; }
.ds-obs{ margin:0; font-size:13.5px; color:var(--ink-2); line-height:1.6; }
.ds-stamp{ margin-top:18px; font-size:12px; color:var(--muted); text-align:center; }
@media (max-width:820px){ .ds-grid{ grid-template-columns:1fr; } .ds-hero{ flex-direction:column; } .ds-hero-right{ align-items:flex-start; } }

/* confirm */
.confirm{ padding:26px 24px 20px; text-align:center; }
.confirm-ico{ width:52px; height:52px; border-radius:14px; background:#fdf2f2; color:var(--brand);
  display:grid; place-items:center; margin:0 auto 14px; }
.confirm h2{ margin:0 0 8px; font-size:18px; }
.confirm p{ margin:0 auto; font-size:13.5px; color:var(--ink-2); line-height:1.55; max-width:340px; }
.confirm-note{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--muted);
  background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:7px 12px; margin:16px 0 4px; }
.confirm-btns{ display:flex; gap:10px; justify-content:center; margin-top:16px; }

/* ---------- agenda ---------- */
.agenda{ display:flex; flex-direction:column; gap:22px; max-width:920px; }
.ag-group{ display:flex; flex-direction:column; gap:10px; }
.ag-head{ display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700; color:var(--ink);
  padding-left:2px; }
.ag-head svg{ flex-shrink:0; }
.ag-count{ background:var(--surface-2); border:1px solid var(--line); color:var(--ink-2); font-size:11.5px;
  font-weight:700; border-radius:99px; padding:0 8px; min-width:20px; text-align:center; }
.ag-vencido{ color:#B91C1C; } .ag-vencido svg{ color:#DC2626; }
.ag-hoy{ color:#B45309; } .ag-hoy svg{ color:#D97706; }
.ag-proximo{ color:#1D4ED8; } .ag-proximo svg{ color:#2563EB; }
.ag-normal{ color:var(--ink-2); } .ag-normal svg{ color:var(--muted); }
.ag-list{ display:flex; flex-direction:column; gap:9px; }
.ag-card{ display:flex; align-items:stretch; gap:0; text-align:left; background:var(--surface);
  border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden;
  transition:.15s; padding:0; }
.ag-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); border-color:#dcdfe5; }
.ag-rail{ width:4px; flex-shrink:0; }
.ag-rail-vencido{ background:#DC2626; } .ag-rail-hoy{ background:#D97706; }
.ag-rail-proximo{ background:#2563EB; } .ag-rail-normal{ background:#CBD5E1; }
.ag-card-main{ flex:1; padding:13px 16px; min-width:0; }
.ag-card-top{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.ag-client{ font-size:14px; font-weight:700; color:var(--ink); }
.ag-gestion{ font-size:13px; color:var(--ink-2); line-height:1.4; margin-bottom:7px; }
.ag-meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ag-dot{ color:var(--line); }
.ag-gestor{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); font-weight:500; }
.ag-card-right{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  padding:13px 18px; border-left:1px solid var(--line-2); background:var(--surface-2); min-width:96px; }
.ag-vence-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.ag-vence-date{ font-size:16px; font-weight:700; color:var(--ink); }
.ag-vence-rel{ font-size:11px; color:var(--ink-2); }

/* ---------- google calendar integration ---------- */
.btn-gcal{ display:inline-flex; align-items:center; gap:6px; border:1px solid #1a73e8; background:#1a73e8;
  color:#fff; border-radius:8px; padding:8px 13px; font-size:12.5px; font-weight:600; transition:.14s; white-space:nowrap; }
.btn-gcal:hover{ background:#1765cc; border-color:#1765cc; }
.btn-gcal.lg{ padding:10px 16px; font-size:13.5px; border-radius:9px; margin-left:auto; }
.btn-gcal.xs{ margin-top:7px; padding:5px 9px; font-size:11px; border-radius:7px; cursor:pointer; }
.btn-ghost.sm,.btn-gcal.sm{ padding:7px 10px; font-size:12px; }
.ag-banner{ display:flex; align-items:center; gap:14px; background:linear-gradient(180deg,#fff,#f8faff);
  border:1px solid #dbe6fb; border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:15px 18px; }
.ag-banner-ico{ width:42px; height:42px; border-radius:11px; background:#e8f0fe; color:#1a73e8;
  display:grid; place-items:center; flex-shrink:0; }
.ag-banner-title{ display:block; font-size:14.5px; font-weight:700; color:var(--ink); }
.ag-banner-sub{ font-size:12.5px; color:var(--ink-2); }

/* sync modal */
.sync-head{ display:flex; align-items:center; gap:13px; }
.sync-gcal{ width:40px; height:40px; border-radius:11px; background:#e8f0fe; color:#1a73e8; display:grid; place-items:center; flex-shrink:0; }
.sync-bar{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin:4px 0 14px; }
.sync-reminder{ display:flex; flex-direction:column; gap:7px; }
.sync-note{ display:flex; gap:9px; background:#f4f8ff; border:1px solid #dbe6fb; border-radius:10px;
  padding:11px 13px; font-size:12.5px; color:var(--ink-2); line-height:1.5; margin-bottom:16px; }
.sync-note svg{ color:#1a73e8; flex-shrink:0; margin-top:1px; }
.sync-list{ display:flex; flex-direction:column; gap:8px; }
.sync-row{ display:flex; align-items:center; gap:0; background:var(--surface); border:1px solid var(--line);
  border-radius:10px; overflow:hidden; }
.sync-rail{ width:4px; align-self:stretch; flex-shrink:0; }
.sync-row-main{ flex:1; padding:10px 14px; min-width:0; }
.sync-row-top{ display:flex; align-items:center; gap:9px; }
.sync-client{ font-size:13.5px; font-weight:700; color:var(--ink); }
.sync-gestion{ font-size:12px; color:var(--ink-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:340px; }
.sync-done{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:#15803D; }
.sync-row-date{ font-size:13px; font-weight:700; color:var(--ink-2); padding:0 14px; }
.sync-row-actions{ display:flex; align-items:center; gap:7px; padding:0 12px 0 0; }
.dt-cal-actions{ display:flex; align-items:center; gap:9px; margin-top:12px; }

/* ---------- toast ---------- */
.toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:80;
  background:var(--ink); color:#fff; border-radius:11px; padding:12px 18px; font-size:13.5px; font-weight:500;
  display:flex; align-items:center; gap:10px; box-shadow:var(--shadow-lg); animation:toastIn .25s cubic-bezier(.2,.9,.3,1.3); }
@keyframes toastIn{ from{ transform:translate(-50%,12px); opacity:0; } }
.toast-ico{ width:22px; height:22px; border-radius:99px; background:#2ec27a; color:#fff; display:grid; place-items:center; }

@media (max-width:1100px){
  .app{ grid-template-columns:74px 1fr; }
  .sb{ padding:16px 12px 12px; }
  .sb-brand,.sb-sub,.sb-group-label,.sb-item-label,.sb-count,.sb-station,.sb-foot{ display:none; }
  .sb-item{ justify-content:center; padding:11px; }
  .sb-nav{ gap:8px; }
  .tb-date,.tb-sep{ display:none; }
  .kpis{ grid-template-columns:repeat(2,1fr); }
}
